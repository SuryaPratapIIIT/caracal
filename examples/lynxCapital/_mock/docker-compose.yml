name: lynx-mock

services:
  providers:
    build: .
    image: lynx-mock-providers:latest
    networks:
      lynx-mock-network:
        aliases:
          - mercury-bank.mock
          - wise-payouts.mock
          - stripe-treasury.mock
          - netsuite.mock
          - sap-erp.mock
          - quickbooks.mock
          - compliance-nexus.mock
          - ocr-vision.mock
          - vendor-portal.mock
          - tax-rules.mock
          - fx-rates.mock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  lynx-mock-network:
    driver: bridge
