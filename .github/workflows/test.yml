# Validates the Caracal monorepo across TypeScript, Go, Python, and documentation builds.

name: test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*.yml'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'go.work'
      - 'go.work.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - 'apps/**'
      - 'docs/**'
      - 'packages/**'
      - 'services/**'
      - 'tests/**'
      - 'go.work'
      - 'go.work.sum'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.28.0'
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.11'
  GOTOOLCHAIN: auto
  ASTRO_TELEMETRY_DISABLED: '1'
  CI: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      typescript: ${{ steps.paths.outputs.typescript }}
      go: ${{ steps.paths.outputs.go }}
      python: ${{ steps.paths.outputs.python }}
      docs: ${{ steps.paths.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            git ls-files > changed-files.txt
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            git fetch --no-tags --prune --depth=1 origin '${{ github.base_ref }}'
            git diff --name-only 'origin/${{ github.base_ref }}'...HEAD > changed-files.txt
          elif [[ '${{ github.event.before }}' =~ ^0+$ ]]; then
            git ls-files > changed-files.txt
          else
            git diff --name-only '${{ github.event.before }}' '${{ github.sha }}' > changed-files.txt
          fi

          echo 'Changed files:'
          sed 's/^/  /' changed-files.txt

          run_all=false
          if grep -Eq '^\.github/workflows/test\.yml$|^package\.json$|^pnpm-lock\.yaml$|^pnpm-workspace\.yaml$' changed-files.txt; then
            run_all=true
          fi

          typescript=false
          go=false
          python=false
          docs=false

          if [[ "$run_all" == 'true' ]] || grep -Eq '^(apps/|tests/typescript/|packages/(admin/ts|transport-a2a/ts|agent-core/ts|oauth/ts|identity/ts|revocation/ts|transport-mcp/ts|framework-adaptor/|runtime-adaptor/|state-backend/|core/ts)/)' changed-files.txt; then
            typescript=true
          fi

          if [[ "$run_all" == 'true' ]] || grep -Eq '^(go\.work|go\.work\.sum|tests/go/|services/(audit|gateway|sts)/|packages/(core/go|identity/go|revocation/go|transport-mcp/go|framework-adaptor/mcp-nethttp/go)/|apps/agent-coordinator/relay/)' changed-files.txt || grep -Eq '\.go$|go\.mod$' changed-files.txt; then
            go=true
          fi

          if [[ "$run_all" == 'true' ]] || grep -Eq '^(tests/python/|packages/(identity/python|revocation/python|transport-mcp/python|framework-adaptor/mcp-fastmcp/python)/)' changed-files.txt || grep -Eq '\.py$|pyproject\.toml$' changed-files.txt; then
            python=true
          fi

          if [[ "$run_all" == 'true' ]] || grep -Eq '^(docs/|\.github/workflows/deploy\.yml$)' changed-files.txt; then
            docs=true
          fi

          {
            echo "typescript=$typescript"
            echo "go=$go"
            echo "python=$python"
            echo "docs=$docs"
          } >> "$GITHUB_OUTPUT"

  typescript:
    name: TypeScript lint, types, tests, build
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://caracal:caracal@localhost:5432/caracal
      REDIS_URL: redis://localhost:6379
      STS_URL: http://localhost:3001
      ISSUER_URL: http://localhost:4000
      AGENT_COORDINATOR_AUDIENCE: caracal-agent-coordinator
      AGENT_COORDINATOR_SCOPE: agent:coordinate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Generate CLI embedded assets
        run: pnpm --dir apps/cli sync-embedded

      - name: Build TypeScript packages
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir packages/core/ts build
          pnpm --dir packages/oauth/ts build
          pnpm --dir packages/admin/ts build
          pnpm --dir packages/transport-a2a/ts build
          pnpm --dir packages/agent-core/ts build
          pnpm --dir packages/identity/ts build
          pnpm --dir packages/revocation/ts build
          pnpm --dir packages/transport-mcp/ts build
          pnpm --dir packages/framework-adaptor/mcp-express/ts build
          pnpm --dir packages/framework-adaptor/mcp-fastmcp/ts build
          pnpm --dir packages/framework-adaptor/agent-crewai/ts build
          pnpm --dir packages/framework-adaptor/agent-langchain/ts build
          pnpm --dir packages/state-backend/tokenstate-postgres/ts build
          pnpm --dir packages/state-backend/tokencache-cloudflare/ts build
          pnpm --dir packages/runtime-adaptor/cloudflare/ts build
          pnpm --dir apps/api build
          pnpm --dir apps/agent-coordinator build

      - name: Run lint scripts
        run: pnpm -r --if-present lint

      - name: Run type checks
        run: pnpm -r --if-present typecheck

      - name: Run TypeScript tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          run_pkg() {
            local pkg_dir="$1"
            local out_name="$2"
            shift 2
            echo "::group::vitest ${out_name}"
            pnpm --dir "${pkg_dir}" exec vitest run --root "${GITHUB_WORKSPACE}" \
              --coverage.enabled true \
              --coverage.provider=v8 \
              --coverage.reporter=lcov \
              --coverage.reportsDirectory="${GITHUB_WORKSPACE}/coverage/typescript/${out_name}" \
              "$@"
            echo "::endgroup::"
          }
          run_pkg apps/api api \
            tests/typescript/unit/api \
            tests/typescript/security/api \
            tests/typescript/property/api \
            tests/typescript/contract/api \
            tests/typescript/fuzz/api \
            tests/typescript/integration/api
          run_pkg apps/agent-coordinator agent-coordinator tests/typescript/unit/orchestration/agent-coordinator
          run_pkg apps/cli cli tests/typescript/unit/cli
          run_pkg apps/tui tui tests/typescript/unit/tui
          run_pkg packages/core/ts core tests/typescript/unit/shared
          run_pkg packages/admin/ts admin tests/typescript/unit/admin
          run_pkg packages/transport-a2a/ts transport-a2a tests/typescript/unit/transport-a2a
          run_pkg packages/agent-core/ts agent-core tests/typescript/unit/agent-core
          run_pkg packages/framework-adaptor/agent-crewai/ts agent-crewai tests/typescript/unit/agent-crewai
          run_pkg packages/framework-adaptor/agent-langchain/ts agent-langchain tests/typescript/unit/agent-langchain
          run_pkg packages/oauth/ts oauth tests/typescript/unit/sdk/oauth
          run_pkg packages/framework-adaptor/mcp-express/ts mcp-express tests/typescript/unit/sdk/mcp-express
          run_pkg packages/identity/ts identity tests/typescript/unit/identity
          run_pkg packages/state-backend/tokencache-cloudflare/ts tokencache-cloudflare tests/typescript/unit/sdk/tokencache-cloudflare
          run_pkg packages/runtime-adaptor/cloudflare/ts runtime-cloudflare tests/typescript/unit/sdk/runtime-cloudflare

      - name: List TypeScript coverage outputs
        if: always()
        shell: bash
        run: |
          echo 'Coverage tree:'
          ls -laR coverage/typescript 2>&1 || echo 'coverage/typescript missing'

      - name: Build TypeScript packages
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir packages/framework-adaptor/mcp-fastmcp/ts build

      - name: Upload TypeScript coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-typescript
          path: coverage/typescript/**/lcov.info
          if-no-files-found: error
          retention-days: 7

  go:
    name: Go tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work
            go.work.sum
            **/go.mod

      - name: Run Go tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage/go
          go test -race -covermode=atomic -coverprofile=coverage/go/coverage.out ./packages/core/go/... ./services/sts/... ./services/audit/... ./services/gateway/... ./apps/agent-coordinator/relay/... ./packages/transport-mcp/go/... ./packages/framework-adaptor/mcp-nethttp/go/...
          go tool cover -func=coverage/go/coverage.out

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-go
          path: coverage/go/coverage.out
          if-no-files-found: error
          retention-days: 7

  python:
    name: Python tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: packages/identity/python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install pip==25.1.1
          python -m pip install -e packages/identity/python -e packages/revocation/python -e packages/transport-mcp/python -e packages/framework-adaptor/mcp-fastmcp/python coverage==7.13.5 cryptography==48.0.0

      - name: Run Python tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/packages/identity/python:${{ github.workspace }}/packages/revocation/python:${{ github.workspace }}/packages/transport-mcp/python:${{ github.workspace }}/packages/framework-adaptor/mcp-fastmcp/python:${{ github.workspace }}/tests/shared/test-utils/python
        run: |
          set -euxo pipefail
          mkdir -p coverage/python
          coverage run --source=packages/identity/python/caracalai_identity,packages/revocation/python/caracalai_revocation,packages/transport-mcp/python/caracalai_transport_mcp,packages/framework-adaptor/mcp-fastmcp/python/caracalai_mcp_fastmcp \
            -m unittest discover -s tests/python -p 'test_*.py' -v
          coverage xml -o coverage/python/coverage.xml
          coverage report --show-missing

      - name: List Python coverage outputs
        if: always()
        shell: bash
        run: ls -la coverage/python 2>&1 || echo 'coverage/python missing'

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-python
          path: coverage/python/coverage.xml
          if-no-files-found: error
          retention-days: 7

  docs:
    name: Docs build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build static docs
        run: pnpm --dir docs build

      - name: Verify docs artifact
        run: |
          set -euo pipefail
          test -f docs/dist/index.html
          test -f docs/dist/CNAME
          grep -Fx 'docs.garudexlabs.com' docs/dist/CNAME

  coverage:
    name: Upload coverage
    needs:
      - typescript
      - go
      - python
    if: always() && !cancelled() && (needs.typescript.result == 'success' || needs.go.result == 'success' || needs.python.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*
          path: coverage

      - name: List coverage files
        run: find coverage -maxdepth 4 -type f -print | sort

      - name: Upload coverage reports to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-typescript/**/lcov.info,coverage/coverage-go/coverage.out,coverage/coverage-python/coverage.xml
          disable_search: true
          fail_ci_if_error: true

  status:
    name: Test status
    needs:
      - changes
      - typescript
      - go
      - python
      - docs
      - coverage
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          set -euo pipefail
          for result in '${{ needs.changes.result }}' '${{ needs.typescript.result }}' '${{ needs.go.result }}' '${{ needs.python.result }}' '${{ needs.docs.result }}' '${{ needs.coverage.result }}'; do
            if [[ "$result" == 'failure' || "$result" == 'cancelled' ]]; then
              echo "A required test workflow job ended with $result."
              exit 1
            fi
          done
          echo 'All required test workflow jobs passed or were skipped by path filters.'
